arm_controller:
  ros__parameters:
    joints:
      base_slide:
        type: prismatic
        min_position: -0.5
        max_position: 0.5
        max_velocity: 0.1
        max_acceleration: 0.5
      shoulder:
        type: revolute
        min_position: -1.5708
        max_position: 1.5708
        max_velocity: 1.0
        max_acceleration: 2.0
      elbow:
        type: revolute
        min_position: 0.0
        max_position: 2.6
        max_velocity: 1.0
        max_acceleration: 2.0
      wrist_twist:
        type: revolute
        min_position: -3.14159
        max_position: 3.14159
        max_velocity: 2.0
        max_acceleration: 4.0
      claw:
        type: revolute
        min_position: 0.0
        max_position: 1.2
        max_velocity: 1.0
        max_acceleration: 2.0
    control_rate: 100.0
    velocity_smoothing: 0.8
